name: ci
on: [push, pull_request]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Windows is tracked as a known limitation for v0 — test timing +
        # subprocess path-to-file-URL issues hit Windows only. Revisit post-v0.
        os: [ubuntu-24.04]
        node: ['22']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Windows Defender exclusion (hosted runner)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA\pnpm\store"
          Add-MpPreference -ExclusionProcess "node.exe"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Corepack preflight
        shell: bash
        run: |
          V=$(corepack --version || echo "0.0")
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          if [ "$MAJOR" -eq 0 ] && [ "$MINOR" -lt 31 ]; then
            echo "Corepack $V below 0.31.0 — upgrading"
            npm install -g corepack@latest
          fi
          corepack enable pnpm
          command -v pnpm
          pnpm --version
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pnpm-cache
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ matrix.os }}-${{ matrix.node }}-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ matrix.os }}-${{ matrix.node }}-
            pnpm-${{ matrix.os }}-
      - run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - name: Guard against raw === token comparisons
        shell: bash
        run: |
          # Find any line in daemon src that compares a *Token* identifier with raw ===.
          # Allowed pattern: compareToken(...).
          # Disallowed: `if (token === expected)` or `foo.token === bar`.
          if grep -rnE '[A-Za-z_]*[Tt]oken[A-Za-z_]*\s*===' packages/daemon/src/; then
            echo "::error::Raw === token comparison found. Use compareToken() from ./auth.js instead."
            exit 1
          fi
          if grep -rnE '===\s*[A-Za-z_]*[Tt]oken[A-Za-z_]*' packages/daemon/src/; then
            echo "::error::Raw === token comparison found. Use compareToken() from ./auth.js instead."
            exit 1
          fi
      - run: pnpm -r run lint
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
      - run: pnpm --filter @redesigner/vite run test:parallelism
      - name: Fixture update guard (three-dot diff)
        shell: bash
        run: |
          test -z "$REDESIGNER_FIXTURE_UPDATE" || (echo "REDESIGNER_FIXTURE_UPDATE set in CI" && exit 1)
          base="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          changed=$(git diff --name-only "$base"...HEAD || true)
          if echo "$changed" | grep -qE 'test/fixtures/.+/(output\.tsx|expected-manifest\.json)$'; then
            echo "$changed" | grep -q 'test/fixtures/FIXTURE_CHANGELOG.md' || { echo "fixture changed without FIXTURE_CHANGELOG.md entry"; exit 1; }
          fi
      - name: Redactor pattern guard
        shell: bash
        run: |
          # Grep daemon source for patterns that must never appear in plain-text form.
          # Lines defining constants/regexes for these patterns are excluded via the
          # grep -v filter (REDACT, _PREFIX, _RE, // comment lines).
          while IFS= read -r pat; do
            [[ -z "$pat" || "$pat" == \#* ]] && continue
            if grep -rE "$pat" packages/daemon/src/ --include='*.ts' \
              | grep -v 'REDACT_KEYS\|SUBPROTO_BEARER_RE\|SUBPROTO_BEARER_PREFIX\|MAX_SUBPROTOCOL_ENTRIES'; then
              echo "Redactor pattern '$pat' appears unguarded in daemon source"
              exit 1
            fi
          done < .github/redactor-patterns.txt
      - name: No .only / .skip (belt + Biome rule)
        shell: bash
        run: |
          ! git grep -En '\b(describe|it|test)\.(only|skip)\b' -- 'packages/*/test' || exit 1
      - name: Per-directory non-empty assertion
        shell: bash
        run: |
          for dir in packages/vite/test/unit packages/vite/test/fixtures packages/vite/test/integration; do
            count=$(find "$dir" -name '*.test.ts' | wc -l)
            if [ "$count" -lt 1 ]; then echo "$dir has no .test.ts files"; exit 1; fi
          done
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.os }}-${{ matrix.node }}
          path: |
            packages/vite/test/**/*.log
            **/.redesigner/manifest.json*

  # Detect which path buckets changed so downstream jobs can gate cheaply.
  paths:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      ext_chromeMock: ${{ steps.filter.outputs.ext_chromeMock }}
      ext_integration: ${{ steps.filter.outputs.ext_integration }}
      ext_src_chrome_added: ${{ steps.chrome_grep.outputs.added }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ext_chromeMock:
              - 'packages/ext/test/chromeMock/**'
            ext_integration:
              - 'packages/ext/test/integration/**'
      - name: Detect new chrome.* references in ext src
        id: chrome_grep
        shell: bash
        run: |
          BASE=$(git merge-base "origin/${{ github.base_ref }}" HEAD)
          if git diff --unified=0 "$BASE"...HEAD -- 'packages/ext/src/**' | grep -E '^\+.*chrome\.' >/dev/null; then
            echo "added=true" >> "$GITHUB_OUTPUT"
          else
            echo "added=false" >> "$GITHUB_OUTPUT"
          fi

  ext-chromemock-fidelity:
    if: |
      github.event_name == 'pull_request' &&
      (needs.paths.outputs.ext_chromeMock == 'true' ||
       needs.paths.outputs.ext_integration == 'true' ||
       needs.paths.outputs.ext_src_chrome_added == 'true')
    needs: paths
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Corepack preflight
        shell: bash
        run: |
          V=$(corepack --version || echo "0.0")
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          if [ "$MAJOR" -eq 0 ] && [ "$MINOR" -lt 31 ]; then
            echo "Corepack $V below 0.31.0 — upgrading"
            npm install -g corepack@latest
          fi
          corepack enable pnpm
          command -v pnpm
          pnpm --version
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-ubuntu-24.04-22-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-ubuntu-24.04-22-
            pnpm-ubuntu-24.04-
      - run: pnpm install --frozen-lockfile --strict-peer-dependencies
      - run: pnpm --filter @redesigner/ext test -- test/chromeMock/fidelity.test.ts

  all-green:
    needs: [test]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify all matrix cells passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Matrix job did not succeed: ${{ needs.test.result }}"
            exit 1
          fi
